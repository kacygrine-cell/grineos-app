const apiFetch=async(path,token,opts={})=>{
  const h={"Content-Type":"application/json",...(token?{Authorization:`Bearer ${token}`}:{}),...(opts.headers||{})};
  const r=await fetch(`${API}${path}`,{...opts,headers:h});
  const d=await r.json();
  if(!r.ok)throw new Error(d.detail||JSON.stringify(d));
  return d;
};

/* ═══ CHART COMPONENTS ═══ */
function DonutChart({data,size=200,thickness=32}){
  const total=data.reduce((s,d)=>s+d.value,0);
  if(total===0)return null;
  const cx=size/2,cy=size/2,r=(size-thickness)/2;
  let cumAngle=-90;
  const paths=data.map((d,i)=>{
    const pct=d.value/total;
    const angle=pct*360;
    const start=cumAngle;
    cumAngle+=angle;
    const end=cumAngle;
    const startRad=(start*Math.PI)/180;
    const endRad=(end*Math.PI)/180;
    const x1=cx+r*Math.cos(startRad),y1=cy+r*Math.sin(startRad);
    const x2=cx+r*Math.cos(endRad),y2=cy+r*Math.sin(endRad);
    const large=angle>180?1:0;
    const path=`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
    return React.createElement("path",{key:i,d:path,fill:"none",stroke:CHART_COLORS[i%CHART_COLORS.length],strokeWidth:thickness,strokeLinecap:"round",style:{transition:"all 0.6s ease",opacity:0.9}});
  });
  return React.createElement("svg",{width:size,height:size,viewBox:`0 0 ${size} ${size}`},
    React.createElement("circle",{cx,cy,r,fill:"none",stroke:C.border,strokeWidth:thickness,opacity:0.3}),
    ...paths,
    React.createElement("text",{x:cx,y:cy-8,textAnchor:"middle",fill:C.text,fontFamily:T.mono,fontSize:18,fontWeight:600},"$"+(total/1e6).toFixed(1)+"M"),
    React.createElement("text",{x:cx,y:cy+12,textAnchor:"middle",fill:C.soft,fontFamily:T.body,fontSize:11},"Total Value")
  );
}

function HBarChart({data,maxWidth=300}){
  const maxVal=Math.max(...data.map(d=>Math.abs(d.value)),0.01);
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
    data.map((d,i)=>{
      const pct=Math.abs(d.value)/maxVal*100;
      const isNeg=d.value<0;
      const color=d.color||CHART_COLORS[i%CHART_COLORS.length];
      return React.createElement("div",{key:i,style:{animation:`fadeUp 0.3s ease ${i*0.05}s both`}},
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
          React.createElement("span",{style:{fontSize:12,color:C.text,fontWeight:500}},d.label),
          React.createElement("span",{style:{fontSize:12,fontFamily:T.mono,color:isNeg?C.red:color,fontWeight:600}},
            typeof d.display==="string"?d.display:(d.value>=0?"+":"")+d.value.toFixed(2)+"%"
          )
        ),
        React.createElement("div",{style:{height:6,background:C.bg,borderRadius:3,overflow:"hidden"}},
          React.createElement("div",{style:{height:"100%",width:`${pct}%`,background:isNeg?`linear-gradient(90deg,${C.red},${C.red}88)`:`linear-gradient(90deg,${color},${color}88)`,borderRadius:3,transition:"width 0.8s ease"}})
        )
      );
    })
  );
}

function MetricCard({label,value,sub,color=C.cyan,large}){

}

/* ═══ SMART RESULT RENDERER ═══ */
function SmartResult({data,context}){
  if(!data)return null;

  const sections=[];
  const keys=Object.keys(data);

  // Extract metrics (numbers at top level)
  const metrics=[];
  const metricKeys=["expected_return","annual_return","annualized_return","total_return","sharpe_ratio","sharpe","volatility","annual_volatility","annualized_volatility","max_drawdown","sortino_ratio","sortino","calmar_ratio","beta","alpha","tracking_error","information_ratio","var_95","cvar_95","portfolio_return","portfolio_volatility","portfolio_value","total_value"];
  const metricLabels={"expected_return":"Expected Return","annual_return":"Annual Return","annualized_return":"Ann. Return","total_return":"Total Return","sharpe_ratio":"Sharpe Ratio","sharpe":"Sharpe Ratio","volatility":"Volatility","annual_volatility":"Ann. Volatility","annualized_volatility":"Ann. Volatility","max_drawdown":"Max Drawdown","sortino_ratio":"Sortino Ratio","sortino":"Sortino","calmar_ratio":"Calmar Ratio","beta":"Beta","alpha":"Alpha","tracking_error":"Tracking Error","information_ratio":"Info Ratio","var_95":"VaR 95%","cvar_95":"CVaR 95%","portfolio_return":"Portfolio Return","portfolio_volatility":"Portfolio Vol","portfolio_value":"Portfolio Value","total_value":"Total Value"};
  const metricColors={"expected_return":C.green,"annual_return":C.green,"annualized_return":C.green,"total_return":C.green,"sharpe_ratio":C.cyan,"sharpe":C.cyan,"volatility":C.gold,"annual_volatility":C.gold,"annualized_volatility":C.gold,"max_drawdown":C.red,"sortino_ratio":C.cyan,"var_95":C.red,"cvar_95":C.red};

  const flatData={...data};
  // Also look inside nested objects like "metrics" or "summary"
  ["metrics","summary","statistics","performance","risk","risk_metrics","portfolio_metrics"].forEach(k=>{
    if(flatData[k]&&typeof flatData[k]==="object"&&!Array.isArray(flatData[k])){
      Object.entries(flatData[k]).forEach(([mk,mv])=>{if(!flatData[mk])flatData[mk]=mv});
    }
  });

  metricKeys.forEach(k=>{
    if(flatData[k]!==undefined&&typeof flatData[k]==="number"){
      const isPercent=k.includes("return")||k.includes("volatility")||k.includes("drawdown")||k.includes("var")||k.includes("alpha")||k.includes("tracking");
      const isPure=k.includes("sharpe")||k.includes("sortino")||k.includes("calmar")||k.includes("beta")||k.includes("ratio");
      const isDollar=k.includes("value");
      let display;
      if(isDollar)display="$"+(flatData[k]/1e6>=1?(flatData[k]/1e6).toFixed(2)+"M":flatData[k].toLocaleString());
      else if(isPercent)display=(flatData[k]*100<100&&flatData[k]*100>-100?(flatData[k]*100).toFixed(2):flatData[k].toFixed(2))+"%";
      else display=flatData[k].toFixed(3);
      metrics.push({label:metricLabels[k]||k.replace(/_/g," "),value:display,color:metricColors[k]||C.cyan});
    }
  });

  if(metrics.length>0){
    sections.push(React.createElement("div",{key:"metrics",style:{marginBottom:28}},
      React.createElement(SectionTitle,null,"Key Metrics"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:12}},
        metrics.map((m,i)=>React.createElement(MetricCard,{key:i,...m}))
      )
    ));
  }

  // Extract weights/allocations
  const weightsKey=keys.find(k=>k==="weights"||k==="allocations"||k==="optimal_weights"||k==="target_weights");
  if(weightsKey&&typeof data[weightsKey]==="object"&&!Array.isArray(data[weightsKey])){
    const w=data[weightsKey];
    const entries=Object.entries(w).sort((a,b)=>b[1]-a[1]);
    const chartData=entries.map(([k,v])=>({label:k,value:v*100}));
    const donutData=entries.map(([k,v])=>({label:k,value:Math.abs(v)}));

    sections.push(React.createElement("div",{key:"weights",style:{marginBottom:28}},
      React.createElement(SectionTitle,null,"Optimal Allocation"),
      React.createElement("div",{style:{display:"flex",gap:32,alignItems:"flex-start",flexWrap:"wrap"}},
        React.createElement("div",{style:{flex:"0 0 auto"}},
          React.createElement(DonutChart,{data:donutData,size:180,thickness:28})
        ),
        React.createElement("div",{style:{flex:1,minWidth:250}},
          React.createElement(HBarChart,{data:chartData.map((d,i)=>({...d,display:d.value.toFixed(1)+"%",color:CHART_COLORS[i%CHART_COLORS.length]}))})
        )
      )
    ));
  }

  // Extract holdings
  const holdingsKey=keys.find(k=>k==="holdings"||k==="positions");
  if(holdingsKey&&Array.isArray(data[holdingsKey])&&data[holdingsKey].length>0){
    const h=data[holdingsKey];
    const headers=["Ticker","Name","Asset Class","Value","Weight"];
    const total=h.reduce((s,x)=>s+(x.value||0),0);
    const rows=h.map(x=>[
      x.ticker||x.symbol||"-",
      x.name||"-",
      x.asset_class||"-",
      "$"+(x.value||0).toLocaleString(),
      total>0?((x.value/total)*100).toFixed(1)+"%":"—"
    ]);
    sections.push(React.createElement("div",{key:"holdings",style:{marginBottom:28}},
      React.createElement(SectionTitle,null,"Holdings"),
      React.createElement(DataTable,{headers,rows})
    ));
  }

  // Extract scenarios/impacts
  const impactKey=keys.find(k=>k==="impacts"||k==="asset_impacts"||k==="results"||k==="scenario_results");
  if(impactKey&&typeof data[impactKey]==="object"){
    const imp=data[impactKey];
    let barData;
    if(Array.isArray(imp)){
      barData=imp.map((x,i)=>({label:x.name||x.ticker||x.asset||`Item ${i}`,value:typeof x.impact==="number"?x.impact*100:typeof x.return==="number"?x.return*100:0}));
    }else{
      barData=Object.entries(imp).map(([k,v])=>({label:k,value:(typeof v==="number"?v:v?.impact||v?.return||0)*100}));
    }
    if(barData.length>0){
      sections.push(React.createElement("div",{key:"impacts",style:{marginBottom:28}},
        React.createElement(SectionTitle,null,"Impact Analysis"),
        React.createElement("div",{style:{maxWidth:500}},React.createElement(HBarChart,{data:barData}))
      ));
    }
  }

  // Raw JSON fallback (collapsible)
  sections.push(React.createElement(RawToggle,{key:"raw",data}));

  return React.createElement("div",{style:{animation:"fadeUp 0.4s ease"}},sections);
}

function RawToggle({data}){
  const[open,setOpen]=useState(false);
  return React.createElement("div",{style:{marginTop:12}},
    React.createElement("button",{onClick:()=>setOpen(!open),style:{...btnG,fontSize:11,padding:"6px 14px",color:C.faint,borderColor:C.border+"88"}},open?"Hide Raw JSON ▲":"Show Raw JSON ▼"),
    open&&React.createElement("div",{style:{marginTop:12,background:C.surface,borderRadius:12,border:`1px solid ${C.border}`,padding:20}},
      React.createElement("pre",{style:{fontFamily:T.mono,fontSize:11,color:C.soft,lineHeight:1.6,whiteSpace:"pre-wrap",overflowX:"auto",wordBreak:"break-word"}},JSON.stringify(data,null,2))
    )
  );
}

/* ═══ AUTH ═══ */
function AuthScreen({onAuth}){
  const[mode,setMode]=useState("login");
  const[email,setEmail]=useState("");
  const[pw,setPw]=useState("");
  const[tenant,setTenant]=useState("");
  const[loading,setLoading]=useState(false);
  const[err,setErr]=useState("");

  const go=async()=>{
    setLoading(true);setErr("");
    try{
      if(mode==="register"){
        await apiFetch("/api/v1/auth/register",null,{method:"POST",body:JSON.stringify({tenant_name:tenant||"Default",tenant_slug:(tenant||"default").toLowerCase().replace(/\s+/g,"-"),admin_email:email,admin_password:pw})});
        setMode("login");alert("Account created — now sign in.");
      }else{
        const d=await apiFetch("/api/v1/auth/login",null,{method:"POST",body:JSON.stringify({email,password:pw,tenant_slug:(tenant||"default").toLowerCase().replace(/\s+/g,"-")})});
        onAuth(d.access_token,email);
      }
    }catch(e){setErr(e.message)}finally{setLoading(false)}
  };

  return React.createElement("div",{style:{minHeight:"100vh",background:`radial-gradient(ellipse at 30% 20%,${C.bgAlt},${C.bg} 70%)`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:T.body,color:C.text,padding:24}},
    React.createElement("div",{style:{animation:"fadeUp .6s ease",maxWidth:420,width:"100%"}},
      React.createElement("div",{style:{textAlign:"center",marginBottom:48}},
        React.createElement("div",{style:{fontFamily:T.display,fontSize:38,fontWeight:700,color:C.cyan,letterSpacing:"-0.02em"}},"GrineOS"),
        React.createElement("div",{style:{fontSize:13,color:C.soft,marginTop:6,letterSpacing:"0.12em",textTransform:"uppercase",fontWeight:300}},"Allocation Intelligence Platform")
      ),
      React.createElement("div",{style:{background:C.surface,borderRadius:16,border:`1px solid ${C.border}`,padding:32,boxShadow:"0 24px 80px rgba(0,0,0,0.4)"}},
        React.createElement("div",{style:{display:"flex",marginBottom:28}},
          ["login","register"].map(m=>React.createElement("button",{key:m,onClick:()=>{setMode(m);setErr("")},style:{flex:1,padding:"10px 0",background:mode===m?C.cyanDim:"transparent",color:mode===m?C.cyan:C.faint,border:`1px solid ${mode===m?C.cyan+"44":C.border}`,borderRadius:m==="login"?"8px 0 0 8px":"0 8px 8px 0",fontFamily:T.mono,fontSize:11,fontWeight:600,cursor:"pointer",textTransform:"uppercase",letterSpacing:"0.08em",transition:"all .2s"}},m))
        ),
        React.createElement("div",{style:{marginBottom:16}},
          React.createElement("label",{style:lbl},mode==="register"?"Tenant / Firm Name":"Tenant Slug"),
          React.createElement("input",{style:inp,value:tenant,onChange:e=>setTenant(e.target.value),placeholder:mode==="register"?"My Firm":"e.g. kgco"})
        ),
        React.createElement("label",{style:lbl},"Email"),
        React.createElement("input",{style:inp,type:"email",value:email,onChange:e=>setEmail(e.target.value),placeholder:"analyst@firm.com"}),
        React.createElement("div",{style:{height:16}}),
        React.createElement("label",{style:lbl},"Password"),
        React.createElement("input",{style:inp,type:"password",value:pw,onChange:e=>setPw(e.target.value),placeholder:"••••••••",onKeyDown:e=>e.key==="Enter"&&go()}),
        err&&React.createElement("div",{style:eBox},err),
        React.createElement("button",{onClick:go,disabled:loading,style:{...btnC,width:"100%",marginTop:24,opacity:loading?0.5:1}},loading&&React.createElement(Spin,null),mode==="login"?"Sign In":"Create Account")
      ),
      React.createElement("div",{style:{textAlign:"center",marginTop:28,fontSize:11,color:C.faint}},"Grine Technologies Ltd · A KG&Co Company")
    )
  );
}

/* ── Agent ── */
function AgentTab({token,demoP}){
  const[input,setInput]=useState("");
  const[msgs,setMsgs]=useState([]);
  const[loading,setLoading]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const send=async()=>{
    if(!input.trim()||loading)return;
    const q=input.trim();setInput("");
    setMsgs(p=>[...p,{role:"user",content:q}]);
    setLoading(true);
    try{
      const portfolio=demoP||{id:"default",name:"Default",client_name:"Client",holdings:[],as_of_date:new Date().toISOString().split("T")[0]};
      const d=await apiFetch("/api/v1/agent/chat",token,{method:"POST",body:JSON.stringify({message:q,portfolio})});
      setMsgs(p=>[...p,{role:"ai",content:d.response||d.message||JSON.stringify(d,null,2)}]);
    }catch(e){setMsgs(p=>[...p,{role:"err",content:e.message}])}
    finally{setLoading(false)}
  };

  const prompts=["What are the biggest risks in this portfolio?","Optimize for maximum Sharpe ratio","Run a 2008-style stress test"];

  return React.createElement("div",{style:{display:"flex",flexDirection:"column",height:"100%"}},
    React.createElement("div",{style:{flex:1,overflowY:"auto",padding:"28px 32px",display:"flex",flexDirection:"column",gap:14}},
      msgs.length===0&&React.createElement("div",{style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:20}},
        React.createElement("div",{style:{fontFamily:T.display,fontSize:56,color:C.cyan,opacity:0.08,fontWeight:700}},"G"),
        React.createElement("div",{style:{color:C.soft,fontSize:14}},"Agent ready. Describe an allocation task."),
        React.createElement("div",{style:{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",maxWidth:600}},
          prompts.map((p,i)=>React.createElement("button",{key:i,onClick:()=>setInput(p),style:{...btnG,fontSize:11,padding:"8px 14px",borderRadius:20,maxWidth:220,textAlign:"left",lineHeight:1.5}},p))
